<!doctype html>
<html lang="en" data-design="liquid" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="MobileClaw public demo: chat, tasks, brain, kanban, trips, vault, agents — anonymized, no real secrets."
    />
    <meta name="theme-color" content="#000000" />
    <meta property="og:title" content="MobileClaw — public demo" />
    <meta
      property="og:description"
      content="iPhone-modern web demo of MobileClaw with three design systems. Local-only data."
    />
    <meta property="og:url" content="https://openclaw-one.pages.dev" />
    <title>MobileClaw — public demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var raw = localStorage.getItem('mobileclaw-public-demo-v2')
        var design = 'liquid'
        var mode = 'dark'
        if (raw) {
          var parsed = JSON.parse(raw)
          if (parsed.design) design = parsed.design
          if (parsed.themeMode) mode = parsed.themeMode
        }
        document.documentElement.setAttribute('data-design', design)
        document.documentElement.setAttribute('data-theme', mode)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <main style="font-family: system-ui; max-width: 28rem; margin: 2rem auto; padding: 1rem">
        <h1>MobileClaw</h1>
        <p>Enable JavaScript for the interactive public demo.</p>
        <p>
          <a href="https://github.com/brianference/mobileclaw">Native source</a>
        </p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
