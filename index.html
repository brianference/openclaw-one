<!doctype html>
<html lang="en" data-design="oled" data-theme="dark" data-btn="solid">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="MobileClaw public demo: chat, tasks, brain, kanban, trips, vault, agents — anonymized, no real secrets."
    />
    <meta name="theme-color" content="#0b1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta property="og:title" content="MobileClaw — public demo" />
    <meta
      property="og:description"
      content="Deep OLED + Aurora night MobileClaw demo. Local-only, no secrets."
    />
    <meta property="og:url" content="https://openclaw-one.pages.dev" />
    <title>MobileClaw — public demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var raw = localStorage.getItem('mobileclaw-public-demo-v2')
        var mode = 'dark'
        var btn = 'solid'
        if (raw) {
          var parsed = JSON.parse(raw)
          if (parsed.themeMode) mode = parsed.themeMode
          if (parsed.buttonStyle === 'soft' || parsed.buttonStyle === 'glow' || parsed.buttonStyle === 'solid') {
            btn = parsed.buttonStyle
          }
        }
        document.documentElement.setAttribute('data-design', 'oled')
        document.documentElement.setAttribute('data-theme', mode)
        document.documentElement.setAttribute('data-btn', btn)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <main style="font-family: system-ui; max-width: 28rem; margin: 2rem auto; padding: 1rem">
        <h1>MobileClaw</h1>
        <p>Enable JavaScript for the interactive public demo.</p>
        <p>
          <a href="https://github.com/brianference/mobileclaw">Native source</a>
        </p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
